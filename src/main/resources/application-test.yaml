spring:
  application:
    name: PurchaseTx
  datasource:
    # setup connection URL with UTC timezone
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;TIME ZONE=UTC
    # Looks for DB_USERNAME env var, defaults to 'sa'
    username: ${DB_USERNAME:sa}
    # Looks for DB_PASSWORD env var, defaults to empty
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
      hibernate.format_sql: true
      hibernate.jdbc.time_zone: UTC #tell it to use UTC timezone
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: false

treasury:
  api:
    base-url: http://localhost:${wiremock.server.port:8089}
    connect-timeout: 1s
    read-timeout: 2s

logging:
  level:
    com.mveksler.purchasetx: DEBUG
    org.springframework.web: DEBUG