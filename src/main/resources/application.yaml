spring:
  application:
    name: PurchaseTx
  datasource:
    # setup H2 connection with UTC timezone and file store for persistence
    url: jdbc:h2:file:./data/purchases;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;TIME ZONE=UTC
    driver-class-name: org.h2.Driver
    # Looks for DB_USERNAME env var, defaults to 'sa'
    username: ${DB_USERNAME:sa}
    # Looks for DB_PASSWORD env var, defaults to empty
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate    # flyway manages schema lifecycle
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
      hibernate.format_sql: true
      hibernate.jdbc.time_zone: UTC #tell it to use UTC timezone
  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    cache-names: exchangeRates
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=24h,recordStats

treasury:
  api:
    base-url: https://api.fiscaldata.treasury.gov
    connect-timeout: 3s
    read-timeout: 5s

logging:
  level:
    com.mveksler.purchasetx: INFO

server:
  port: 8080