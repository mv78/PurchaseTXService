spring:
  application:
    name: PurchaseTx
  datasource:
    url: jdbc:h2:file:./data/purchases;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;TIME ZONE=UTC
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate    # flyway manages schema lifecycle
    properties:
      hibernate.format_sql: true
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    cache-names: exchangeRates
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=24h,recordStats

treasury:
  api:
    base-url: https://api.fiscaldata.treasury.gov
    connect-timeout: 3s
    read-timeout: 5s

logging:
  level:
    com.mveksler.purchasetx: INFO

server:
  port: 8080