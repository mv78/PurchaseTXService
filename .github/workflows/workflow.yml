name: Build, Test and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only publish images from main — not from PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Reads <version> from pom.xml without compiling — Maven cache makes it fast
      - name: Read project version
        id: version
        run: |
          echo "VALUE=$(./mvnw help:evaluate \
            -Dexpression=project.version \
            --batch-mode --no-transfer-progress -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Two tags per release:
          #   <version>   — human-readable, matches Maven project version
          #   <sha>       — immutable, safe for kubectl / deployment manifests
          tags: |
            ghcr.io/${{ github.repository_owner }}/purchasetx:${{ steps.version.outputs.VALUE }}
            ghcr.io/${{ github.repository_owner }}/purchasetx:${{ github.sha }}
          # Re-use layers from the previous run stored in the GHA cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
